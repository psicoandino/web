<!DOCTYPE html> 
<html lang="es"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Psicoandino | Lectura</title> 
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Mono&display=swap" rel="stylesheet">
    
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head> 
<body> 

    <div class="top-bar">
        <div class="brand-text">
            <span class="brand-name">PSICOANDINO</span>
            <span class="desktop-only">
                <span class="brand-author">/ Ricardo Alberto</span>
                <span class="brand-concept">— Dios, Ciencia & Mente</span>
            </span>
        </div>
        <div class="top-socials">
             <a href="index.html" class="nav-btn">inicio</a>
        </div>
    </div>

    <div class="reading-layout">
        <nav class="post-nav" style="display: flex; justify-content: space-between; align-items: center; position: sticky; top: var(--top-bar-height); background-color: var(--bg-color); z-index: 90; padding: 15px 0; margin-top: -15px;">
            <a href="narrativa.html" class="back-btn">[ Volver a Narrativa ]</a>
            
            <div id="vector-toggle" style="display: flex; gap: 10px;">
                <button class="nav-btn active-filter" data-lang="en">[ VECTOR: EN ]</button>
                <button class="nav-btn" data-lang="es">[ VECTOR: ES ]</button>
            </div>
        </nav>

        <article id="article-container">
            <div style="font-family: monospace; font-size: 11px; color: #888; text-align: center; margin-top: 50px;">[ Extrayendo vector de información... ]</div>
        </article>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const articleContainer = document.getElementById('article-container');
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = parseInt(urlParams.get('id'));
            
            let currentPost = null;
            let currentLang = 'en'; // ESTADO INICIAL ACTUALIZADO A INGLÉS

            if (!targetId) {
                articleContainer.innerHTML = "<span style='color: red; font-family: monospace;'>[ Error: Parámetro de ruta inválido. Falta ID estructural. ]</span>";
                return;
            }

            fetch('posts.json')
                .then(response => response.json())
                .then(posts => {
                    currentPost = posts.find(p => p.id === targetId);
                    if (!currentPost) {
                        articleContainer.innerHTML = "<span style='color: red; font-family: monospace;'>[ Error: Nodo de información no encontrado en la matriz. ]</span>";
                        return;
                    }
                    renderPost();
                })
                .catch(error => {
                    articleContainer.innerHTML = `<span style='color: red; font-family: monospace;'>[ Falla Crítica: ${error.message} ]</span>`;
                });

            // Motor de Renderizado Lingüístico
            function renderPost() {
                const title = currentLang === 'en' ? currentPost.title_en : currentPost.title_es;
                const content = currentLang === 'en' ? currentPost.content_en : currentPost.content_es;
                
                const wordCount = content.replace(/<[^>]*>?/gm, '').split(/\s+/).length;
                const readingTime = Math.ceil(wordCount / 200);

                const tagsHtml = currentPost.tags.map(tag => `<span style="color: var(--text-muted);">[${tag}]</span>`).join(' ');
                document.title = `Psicoandino | ${title}`;

                articleContainer.innerHTML = `
                    <header style="margin-bottom: 30px; margin-top: 20px;">
                        <h1 class="post-title" style="animation: systemFadeIn 0.5s;">${title}</h1>
                        <div class="post-meta">
                            <span>${currentPost.date}</span>
                            <span>// ${readingTime} MIN</span>
                            <span>${tagsHtml}</span>
                        </div>
                    </header>
                    <div class="post-content" style="animation: systemFadeIn 0.5s;">
                        ${content}
                    </div>
                `;

                // Re-ejecutar el Motor Matemático
                const renderMath = () => {
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        window.MathJax.typesetPromise([articleContainer]).catch(err => {
                            console.error('Error estructural matemático:', err.message);
                        });
                    } else {
                        setTimeout(renderMath, 50);
                    }
                };
                renderMath();
            }

            // Listeners para los Botones Vectoriales
            document.querySelectorAll('#vector-toggle button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('#vector-toggle button').forEach(b => b.classList.remove('active-filter'));
                    e.target.classList.add('active-filter');
                    
                    currentLang = e.target.getAttribute('data-lang');
                    renderPost();
                });
            });
        });
    </script> 
</body> 
</html>
