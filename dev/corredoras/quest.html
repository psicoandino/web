<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Testeo — Oficina de Bolsillo</title>
<style>
    :root {
        --bg-pure: #000000;
        --card-bg: #09090b;
        --border-subtle: #27272a;
        --text-pure: #e4e4e7;
        --text-muted: #a1a1aa;
        --touch-target: 56px;
        --action-bg: #ffffff;
        --action-fg: #0a0a0a;
        --scale-a: #248692;
        --scale-b1: #6d7c50;
        --scale-b2: #b78627;
        --scale-d: #c73a4a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
        background: var(--bg-pure);
        color: var(--text-pure);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        letter-spacing: 0.01em;
        min-height: 100dvh;
        padding: 16px;
        padding-bottom: 80px;
    }
    h1, h2, h3 { font-family: Georgia, Cambria, "Times New Roman", serif; font-weight: 400; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subt { color: var(--text-muted); font-size: 12px; margin-bottom: 20px; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn {
        flex: 1; height: 44px; border-radius: 8px; border: 1px solid var(--border-subtle);
        background: var(--card-bg); color: var(--text-muted); font-size: 13px; cursor: pointer;
    }
    .tab-btn.active { background: var(--action-bg); color: var(--action-fg); border-color: var(--action-bg); font-weight: 600; }

    .vista { display: none; flex-direction: column; gap: 16px; }
    .vista.activa { display: flex; }

    .card {
        background: var(--card-bg); border: 1px solid var(--border-subtle);
        border-radius: 10px; padding: 14px 16px;
    }
    .card h3 { font-size: 14px; margin-bottom: 10px; color: var(--text-pure); }

    .item-check {
        display: flex; align-items: flex-start; gap: 10px;
        padding: 8px 0; border-bottom: 1px solid var(--border-subtle);
        font-size: 13.5px; line-height: 1.4;
    }
    .item-check:last-child { border-bottom: none; }
    .item-check input { width: 20px; height: 20px; margin-top: 1px; flex-shrink: 0; accent-color: var(--scale-a); }

    label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px; }

    input[type="text"], textarea, select {
        width: 100%; background: var(--bg-pure); border: 1px solid var(--border-subtle);
        border-radius: 8px; padding: 10px 12px; color: var(--text-pure); font-size: 14px;
        outline: none; font-family: inherit;
    }
    textarea { resize: vertical; min-height: 60px; }

    .btn {
        height: var(--touch-target); border-radius: 8px; border: 1px solid var(--border-subtle);
        background: var(--card-bg); color: var(--text-pure); font-size: 14px; cursor: pointer; width: 100%;
    }
    .btn-primary { background: var(--action-bg); color: var(--action-fg); font-weight: 600; border: none; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    .hallazgo-item {
        border: 1px solid var(--border-subtle); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
    }
    .hallazgo-item .meta { display: flex; gap: 6px; margin-bottom: 6px; }
    .badge { font-size: 10px; padding: 3px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
    .badge-critico { background: var(--scale-d); color: #fff; }
    .badge-molesto { background: var(--scale-b2); color: #000; }
    .badge-menor { background: var(--scale-b1); color: #000; }
    .hallazgo-item p { font-size: 13px; color: var(--text-pure); }
    .hallazgo-item .seccion { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    #clave-resultado {
        word-break: break-all; font-family: monospace; font-size: 12px;
        background: var(--bg-pure); border: 1px solid var(--border-subtle); border-radius: 8px;
        padding: 12px; margin: 12px 0; color: var(--scale-a);
    }
    .error-toast { color: var(--scale-d); font-size: 12px; min-height: 16px; }
    .empty-state { color: var(--text-muted); font-size: 12px; text-align: center; padding: 16px; }
</style>
</head>
<body>

<h1>Testeo — Oficina de Bolsillo</h1>
<p class="subt">Completa el checklist, agrega hallazgos, genera tu clave y envíala por Correo.</p>

<div class="tabs">
    <button class="tab-btn active" data-vista="completar">Completar</button>
    <button class="tab-btn" data-vista="decodificar">Decodificar</button>
</div>

<div id="vista-completar" class="vista activa"></div>

<div id="vista-decodificar" class="vista">
    <div class="card">
        <h3>Pegar clave recibida</h3>
        <label for="input-clave">Clave (empieza con T-)</label>
        <textarea id="input-clave" placeholder="T-..."></textarea>
        <p class="error-toast" id="error-decode"></p>
        <button class="btn btn-primary" id="btn-decodificar" style="margin-top:10px;">Decodificar</button>
    </div>
    <div id="resultado-decode"></div>
</div>

<script>
(function(){
"use strict";

var SECCIONES = [
    { id:"onboarding", titulo:"1. Onboarding (primera vez)", items:[
        "Pide crear PIN de 4 dígitos.",
        "Pide nombre profesional (máx. 30) y teléfono (8 dígitos).",
        "Aparece el Mineral. \"Continuar\" deshabilitado hasta marcar el checkbox de confirmación.",
        "\"Copiar Mineral\" funciona.",
        "Tras continuar, entra al panel principal.",
        "Si hay un respaldo de prueba: \"¿Ya tienes un respaldo .json?\" en el setup lo carga bien."
    ]},
    { id:"bloqueo", titulo:"2. Bloqueo / desbloqueo", items:[
        "\"Bloquear sesión\" muestra pantalla de PIN.",
        "PIN correcto desbloquea.",
        "PIN incorrecto muestra error y limpia el campo."
    ]},
    { id:"propiedades", titulo:"3. Propiedades", items:[
        "Crear propiedad: slug, tipo, comuna, precio.",
        "Alternar CLP/UF — conversión aparece solo con UF de referencia configurada.",
        "Precio no deja escribir más de 1.000.000.000.",
        "Archivar propiedad — desaparece del inventario activo.",
        "Restaurar desde Papelera — reaparece.",
        "Dos propiedades con nombre similar generan códigos cortos distintos (no chocan)."
    ]},
    { id:"clientes", titulo:"4. Clientes / Leads", items:[
        "Agregar cliente manual.",
        "Buscar por nombre o teléfono.",
        "Ordenar por score / por calificados.",
        "Archivar y restaurar un lead.",
        "Ver detalle de respuestas de un cliente ya calificado."
    ]},
    { id:"flujo_cliente", titulo:"5. Flujo del cliente", items:[
        "\"Copiar Link General\" abierto en incógnito funciona.",
        "Formulario de calificación (4 preguntas) se completa hasta el final.",
        "Al terminar, se arma el sello y abre WhatsApp.",
        "Pegar el sello de vuelta muestra el nombre real de la propiedad, no un código corto.",
        "\"Copiar Link Camuflado\" desde un cliente existente funciona igual.",
        "Alterar un carácter del sello muestra \"Firma Inválida\", no lo acepta silenciosamente."
    ]},
    { id:"respaldo", titulo:"6. Respaldo", items:[
        "Exportar respaldo descarga un .json.",
        "Importar con Mineral correcto pide confirmación antes de reemplazar datos.",
        "Importar con Mineral incorrecto falla con mensaje de error."
    ]},
    { id:"comentarios", titulo:"7. Comentarios", items:[
        "\"Enviar comentarios\" abre WhatsApp con el número real."
    ]},
    { id:"general", titulo:"8. General / dispositivo real", items:[
        "Probado en un celular real, no solo en computador.",
        "Cerrar el navegador y reabrir — los datos persisten.",
        "Los 4 temas (OLED, Oscuro, Claro, Sepia) se ven bien.",
        "\"REINICIAR\" pide confirmación antes de borrar todo."
    ]}
];

var FEEDBACK_EMAIL = "pscndn@gmail.com"; // 

var hallazgos = [];

// ---------- Utilidades (mismo patrón que Corredoras) ----------
function encodeToken(str){
    return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}
function decodeToken(str){
    var b = str.replace(/-/g,"+").replace(/_/g,"/");
    while (b.length % 4) b += "=";
    return decodeURIComponent(escape(atob(b)));
}
function calcSig(payload, salt){
    var str = payload + salt, hash = 0;
    for (var i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }
    return Math.abs(hash).toString(36);
}

// ---------- Render checklist ----------
var contVista = document.getElementById("vista-completar");

SECCIONES.forEach(function(sec){
    var card = document.createElement("div");
    card.className = "card";
    var h3 = document.createElement("h3");
    h3.textContent = sec.titulo;
    card.appendChild(h3);
    sec.items.forEach(function(texto, i){
        var row = document.createElement("label");
        row.className = "item-check";
        row.style.textTransform = "none";
        row.style.letterSpacing = "normal";
        row.innerHTML = '<input type="checkbox" id="chk-' + sec.id + '-' + i + '"><span>' + texto + "</span>";
        card.appendChild(row);
    });
    contVista.appendChild(card);
});

// ---------- Hallazgos ----------
var cardHallazgos = document.createElement("div");
cardHallazgos.className = "card";
cardHallazgos.innerHTML =
    '<h3>Hallazgos</h3>' +
    '<div id="lista-hallazgos"><p class="empty-state">Sin hallazgos todavía.</p></div>' +
    '<label for="h-texto" style="margin-top:10px;">Qué pasó</label>' +
    '<textarea id="h-texto" placeholder="Describe lo que viste..."></textarea>' +
    '<div class="btn-row" style="margin-top:8px;">' +
        '<div style="flex:1;"><label for="h-seccion">Sección</label><select id="h-seccion"></select></div>' +
        '<div style="flex:1;"><label for="h-severidad">Severidad</label><select id="h-severidad">' +
            '<option value="critico">Crítico</option><option value="molesto" selected>Molesto</option><option value="menor">Menor</option>' +
        '</select></div>' +
    '</div>' +
    '<button class="btn" id="btn-agregar-hallazgo" style="margin-top:10px;">+ Agregar hallazgo</button>';
contVista.appendChild(cardHallazgos);

var selSeccion = document.getElementById("h-seccion");
SECCIONES.forEach(function(sec){
    var opt = document.createElement("option");
    opt.value = sec.titulo; opt.textContent = sec.titulo;
    selSeccion.appendChild(opt);
});

function renderHallazgos(){
    var cont = document.getElementById("lista-hallazgos");
    if (hallazgos.length === 0){
        cont.innerHTML = '<p class="empty-state">Sin hallazgos todavía.</p>';
        return;
    }
    cont.innerHTML = hallazgos.map(function(h){
        return '<div class="hallazgo-item">' +
            '<div class="meta"><span class="badge badge-' + h.severidad + '">' + h.severidad + '</span></div>' +
            '<p>' + h.texto + '</p>' +
            '<div class="seccion">' + h.seccion + '</div>' +
        '</div>';
    }).join("");
}

document.getElementById("btn-agregar-hallazgo").addEventListener("click", function(){
    var texto = document.getElementById("h-texto").value.trim();
    if (!texto) return;
    hallazgos.push({
        texto: texto,
        seccion: selSeccion.value,
        severidad: document.getElementById("h-severidad").value
    });
    document.getElementById("h-texto").value = "";
    renderHallazgos();
});

// ---------- Generar clave ----------
var cardClave = document.createElement("div");
cardClave.className = "card";
cardClave.innerHTML =
    '<h3>Generar clave de testeo</h3>' +
    '<button class="btn btn-primary" id="btn-generar-clave">Generar clave</button>' +
    '<div id="clave-resultado" style="display:none;"></div>' +
    '<div class="btn-row" id="clave-acciones" style="display:none; margin-top:10px;">' +
        '<button class="btn" id="btn-copiar-clave">Copiar</button>' +
        '<button class="btn btn-primary" id="btn-email-clave">Enviar por Email</button>' +
    '</div>';
contVista.appendChild(cardClave);

var claveActual = "";

document.getElementById("btn-generar-clave").addEventListener("click", function(){
    var checklist = {};
    SECCIONES.forEach(function(sec){
        checklist[sec.id] = sec.items.map(function(_, i){
            return document.getElementById("chk-" + sec.id + "-" + i).checked;
        });
    });
    var payload = { fecha: new Date().toISOString().slice(0,10), checklist: checklist, hallazgos: hallazgos };
    var json = JSON.stringify(payload);
    var check = calcSig(json, "testeo-ob");
    claveActual = "T-" + encodeToken(json) + "." + check;

    var el = document.getElementById("clave-resultado");
    el.style.display = "block";
    el.textContent = claveActual;
    document.getElementById("clave-acciones").style.display = "flex";
});

document.getElementById("btn-copiar-clave").addEventListener("click", function(){
    if (!claveActual) return;
    navigator.clipboard.writeText(claveActual);
    var btn = document.getElementById("btn-copiar-clave");
    var original = btn.textContent;
    btn.textContent = "¡Copiado!";
    setTimeout(function(){ btn.textContent = original; }, 1200);
});

document.getElementById("btn-email-clave").addEventListener("click", function(){
    if (!claveActual) return;
    var subject = "Clave de testeo — Oficina de Bolsillo";
    var body = "Aquí está mi clave de testeo:\n\n" + claveActual;
    window.location.href = "mailto:" + FEEDBACK_EMAIL + "?subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body);
});

// ---------- Decodificar ----------
document.getElementById("btn-decodificar").addEventListener("click", function(){
    var raw = document.getElementById("input-clave").value.trim();
    var errorEl = document.getElementById("error-decode");
    var resultEl = document.getElementById("resultado-decode");
    errorEl.textContent = "";
    resultEl.innerHTML = "";

    if (!raw.startsWith("T-")) { errorEl.textContent = "La clave debe empezar con T-"; return; }
    var body = raw.slice(2);
    var partes = body.split(".");
    if (partes.length !== 2) { errorEl.textContent = "Clave incompleta o corrupta."; return; }

    try {
        var json = decodeToken(partes[0]);
        if (calcSig(json, "testeo-ob") !== partes[1]) {
            errorEl.textContent = "La clave no coincide — puede estar corrupta o mal copiada.";
            return;
        }
        var payload = JSON.parse(json);
        var html = '<div class="card"><h3>Resultado — ' + payload.fecha + '</h3>';

        SECCIONES.forEach(function(sec){
            var estados = payload.checklist[sec.id] || [];
            html += '<div style="margin-top:10px;"><strong style="font-size:13px;">' + sec.titulo + '</strong>';
            sec.items.forEach(function(texto, i){
                var ok = estados[i];
                html += '<div style="font-size:12.5px; padding:4px 0; color:' + (ok ? 'var(--text-pure)' : 'var(--text-muted)') + ';">' +
                        (ok ? '✅ ' : '⬜ ') + texto + '</div>';
            });
            html += '</div>';
        });
        html += '</div>';

        if (payload.hallazgos && payload.hallazgos.length){
            html += '<div class="card"><h3>Hallazgos reportados</h3>';
            payload.hallazgos.forEach(function(h){
                html += '<div class="hallazgo-item">' +
                    '<div class="meta"><span class="badge badge-' + h.severidad + '">' + h.severidad + '</span></div>' +
                    '<p>' + h.texto + '</p><div class="seccion">' + h.seccion + '</div></div>';
            });
            html += '</div>';
        }
        resultEl.innerHTML = html;
    } catch(e) {
        errorEl.textContent = "No se pudo leer la clave — revisa que se haya copiado completa.";
    }
});

// ---------- Tabs ----------
document.querySelectorAll(".tab-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
        document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.remove("active"); });
        document.querySelectorAll(".vista").forEach(function(v){ v.classList.remove("activa"); });
        btn.classList.add("active");
        document.getElementById("vista-" + btn.dataset.vista).classList.add("activa");
    });
});

})();
</script>
<a href="index.html" title="Volver a Custodia" aria-label="Volver a Custodia" style="position:fixed; bottom:16px; left:16px; width:44px; height:44px; border-radius:50%; background:var(--action-bg); color:var(--action-fg); border:1px solid var(--border-subtle); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:600; text-decoration:none; z-index:10000;">←</a>
<button id="btn-ir-feedback" title="Escribir feedback" aria-label="Escribir feedback" style="position:fixed; bottom:16px; right:16px; width:44px; height:44px; border-radius:50%; background:var(--action-bg); color:var(--action-fg); border:1px solid var(--border-subtle); display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; z-index:10000;">💬</button>
<script>
document.getElementById('btn-ir-feedback').addEventListener('click', function(){
    var campo = document.getElementById('h-texto');
    if (!campo) return;
    campo.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(function(){ campo.focus(); }, 400);
});
</script>
</body>
</html>
