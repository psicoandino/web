<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Milestone 3 — Linker mínimo</title>
    <style>
        body { font-family: monospace; padding: 24px; background:#111; color:#eee; }
        button { font-size: 16px; padding: 10px 18px; cursor: pointer; }
        #log { white-space: pre-wrap; margin-top: 16px; font-size: 13px; color: #7fd; }
    </style>
</head>
<body>
    <h1>Milestone 3 — station.json enlazado por compiler/link_cli.py</h1>
    <p>Carga linked_station/station.json → signals/*.rsig, sin modificar radio-engine.js.</p>
    <button id="btn-tune">[TUNE IN]</button>
    <div id="log"></div>

    <script src="../radio-engine.js"></script>
    <script>
        var logEl = document.getElementById('log');
        function log(msg) {
            logEl.textContent += msg + "\n";
        }

        var engine = new RadioEngine(log);

        document.getElementById('btn-tune').addEventListener('click', async function () {
            try {
                if (!engine.station) {
                    await engine.loadStation('station.json');
                }
                await engine.tune();
            } catch (err) {
                log('ERROR: ' + err.message);
                console.error(err);
            }
        });
    </script>
</body>
</html>
